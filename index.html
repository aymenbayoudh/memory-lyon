	<main>

					<!--<li><span class="percentage" id="stat-forest">0.0</span> de parcs et forêts trouvés</li>-->
					<li><span class="percentage" id="stat-stations">X</span> de gares trouvées</li>

	<script>
// NB: Variable starting with $ are promises.
// And 'join' is a shorthand for Promise.all (see https://github.com/aymenbayoudh/join.js)

///////////////////////////////////////////////////////////
// Immutable configuration globals

const config = {
	// for quick debug iterations, hide maps (do not even load it)
	DISABLE_MAP: false,

	// MapBox access token (only allowed on specific hosts so you can use it
	// localhost but not steal it for your website)
	MAPBOX_ACCESS_TOKEN: 'pk.eyJ1IjoiYXl5eXl5bWVuIiwiYSI6ImNtbW5iMzlzbjAxNnMycHM4cWU4MXZuY3UifQ.kb4H0nwXN74tdrjk86Kn7w'
};

///////////////////////////////////////////////////////////
// Global state

// This is the only place where user data is stored
const state = {
	// Elements that have been found by the user
	found: [],

	// Temporary state that does not need to be serialized
	loading: true,
	showMenu: false,
	showAnswers: true,
	notifyingError: false,
	notifyingDuplicate: false,
	notifyingSuccess: false,
	hoveredCommuneId: null,
	preclickedOnStation: false,

	// Values that can be recomputed at any time from the rest of the state
	cache: {
		counts: { // raw values
			communes: 0,
			surface: 0, // in km²
			inhabitants: 0, // in thousands of people
			stations: 0,
			stationsPerLine: {}, // trainline_key => station count
		},
		stats: { // percentages
			communes: 0.0,
			surface: 0.0,
			inhabitants: 0.0,
			stations: 0.0,
		},
		totalCounts: { // from data loader
			communes: -1,
			surface: -1, // in km²
			inhabitants: -1, // in thousands of people
			stations: -1,
		},
		orderedTrainlines: [],
		foundKeys: {}, // speed up duplicate detection

		// We accumulate here the stations we find
		foundStationsGeojson: {
			type: "FeatureCollection",
			features: [],
		},
		// We accumulate here the commune we find
		foundCommunesGeojson: {
			type: "FeatureCollection",
			features: [],
		},
	}
};

///////////////////////////////////////////////////////////
// DOM binding

const $DOMContentLoaded = new Promise((resolve) => {
	document.addEventListener('DOMContentLoaded', resolve);
});

// Whenever DOM is ready, we get all the elements we eventually need to update.
const $dom = $DOMContentLoaded.then(() => {
	return [
		"search-input",
		"search-form",
		"search-loader",
		"search-notification",
		"scoreboard",
		"found",
		"stat-communes",
		"stat-surface",
		"stat-inhabitants",
		"stat-stations",
		"count-communes",
		"count-surface",
		"count-inhabitants",
		"count-stations",
		"count-stations-per-line",
		"btn-toggle-menu",
		"menu-container",
		"btn-export",
		"btn-import",
		"btn-toggle-answers",
		"btn-about",
		"btn-show-answers",
	].reduce((acc, item) => {
		acc[item] = document.getElementById(item);
		return acc;
	}, {});
});

///////////////////////////////////////////////////////////
// Actions

// Unlike a typical Reduc pattern, actions are not pure.
// We implement this pattern in case we eventually need it, but as long as
// there is nothing like undo/redo system we do not need multiple copies of the
// state so everything can happen in place.
//
// There is a lot of code duplication here, it may be worth splitting the
// controller from the render logic, to be able to call the common control
// parts from multiple event handlers without triggering multiple re-renders
const Action = {
	_initializeTotalCounts: (stationData, state) => {
		state.cache.totalCounts.stations = 0;
		for (const [key, trainline] of Object.entries(stationData.meta.trainlines)) {
			state.cache.totalCounts.stations += trainline['station-count'];
		}

		state.cache.totalCounts.communes = stationData.meta.communes["total-communes"];
		state.cache.totalCounts.inhabitants = stationData.meta.communes["total-inhabitants"];
		state.cache.totalCounts.surface = stationData.meta.communes["total-surface"];

		Action._updateStationStats(state);
		Action._updateCommuneStats(state);
		state.cache.orderedTrainlines = stationData.meta["ordered-trainlines"];
	},

	InitializeStationCache: (stationData) => (dom, state) => {
		Action._initializeTotalCounts(stationData, state);
		renderScoreboard(dom, state, 0);
	},

	StartLoading: () => (dom, state) => {
		state.loading = true;
		renderSearchForm(dom, state);
	},

	StopLoading: () => (dom, state) => {
		state.loading = false;
		renderSearchForm(dom, state);
	},

	ToggleMenu: () => (dom, state) => {
		state.showMenu = !state.showMenu;
		renderMenu(dom, state);
	},

	CloseMenu: () => (dom, state) => {
		state.showMenu = false;
		renderMenu(dom, state);
	},

	_setShowAnswer(dom, state, showAnswers) {
		state.showAnswers = showAnswers;
		$map.then(map => {
			renderMap(map, state);
		});
		renderMenu(dom, state);
		renderScoreboard(dom, state);

		localStorage.setItem("savedState", JSON.stringify(state));
	},

	ToggleAnswers: () => (dom, state) => {
		Action._setShowAnswer(dom, state, !state.showAnswers);
	},

	ShowAnswers: () => (dom, state) => {
		Action._setShowAnswer(dom, state, true);
	},

	// Invoked when the player query does not match any entry
	NotifyError: () => (dom, state) => {
		if (!state.notifyingError) {
			state.notifyingError = true;
			renderSearchForm(dom, state);
			setTimeout(() => {
				state.notifyingError = false;
				renderSearchForm(dom, state);
			}, 1000);
		}
	},

	// Invoked when the player query does not match any entry
	NotifyDuplicate: () => (dom, state) => {
		if (!state.notifyingDuplicate) {
			state.notifyingDuplicate = true;
			renderSearchForm(dom, state);
			setTimeout(() => {
				state.notifyingDuplicate = false;
				renderSearchForm(dom, state);
			}, 1000);
		}
	},

	// Invoked when the player query does not match any entry
	NotifySuccess: () => (dom, state) => {
		if (!state.notifyingSuccess) {
			state.notifyingSuccess = true;
			renderSearchForm(dom, state);
			setTimeout(() => {
				state.notifyingSuccess = false;
				renderSearchForm(dom, state);
			}, 1000);
		}
	},

	_appendStationItemWithoutRender: (item, geoFeature, state) => {
    if (state.cache.foundKeys[item.id]) return false;
    state.cache.foundKeys[item.id] = true;

    state.found = [
        item,
        ...state.found
    ];

    ++state.cache.counts.stations;

    // ✅ Incrément du compteur de ligne (manquait)
    const trainline = geoFeature.properties.trainline;
    if (trainline !== undefined) {
        if (state.cache.counts.stationsPerLine[trainline] === undefined) {
            state.cache.counts.stationsPerLine[trainline] = 0;
        }
        ++state.cache.counts.stationsPerLine[trainline];
    }

    // Update map data
    state.cache.foundStationsGeojson.features.push({
        ...geoFeature,
        id: item.id[1]
    });

    return true;
},

	_renderAfterNewStationItem: (dom, state) => {
        Action._updateStationStats(state);
        join($map, dataLoader.$stationData, (map, stationData) => {
            map.getSource('found-stations').setData(state.cache.foundStationsGeojson);
            renderFoundStationCamemberts(map, stationData, state);
        });
        renderScoreboard(dom, state);
        localStorage.setItem("savedState", JSON.stringify(state));
    },

	AppendFoundStationItem: (item, geoFeature) => (dom, state) => {
		if (!Action._appendStationItemWithoutRender(item, geoFeature, state)) return;
		Action._renderAfterNewStationItem(dom, state);
	},

	AppendMultipleStationItems: (entries) => (dom, state) => {
		for (const [item, geoFeature] of entries) {
			Action._appendStationItemWithoutRender(item, geoFeature, state);
		}
		Action._renderAfterNewStationItem(dom, state);
		renderScoreboard(dom, state);
	},

	_updateStationStats: (state) => {
		state.cache.stats.stations = 100 * state.cache.counts.stations / state.cache.totalCounts.stations;
	},
	_updateCommuneStats: (state) => {
		state.cache.stats.communes = 100 * state.cache.counts.communes / state.cache.totalCounts.communes;
		state.cache.stats.surface = 100 * state.cache.counts.surface / state.cache.totalCounts.surface;
		state.cache.stats.inhabitants = 100 * state.cache.counts.inhabitants / state.cache.totalCounts.inhabitants;
	},

	AppendFoundCommuneItem: (item_id, geoFeature) => (dom, state) => {
		if (state.cache.foundKeys[item_id]) return false;
		state.cache.foundKeys[item_id] = true;

		state.found = [
			{
				id: item_id,
				name: geoFeature.properties.nom // just for ease of debug, the id is the single source of truth
			},
			...state.found
		];

		state.cache.counts.communes += 1;
		state.cache.counts.surface += geoFeature.properties.superficie;
		state.cache.counts.inhabitants += geoFeature.properties.population;

		// Update map data
		console.assert(item_id[1] !== undefined);
		state.cache.foundCommunesGeojson.features.push({
			...geoFeature,
			id: item_id[1]
		});

		Action._updateCommuneStats(state);

		// Render

		$map.then(map => {
			map.getSource('found-communes').setData(state.cache.foundCommunesGeojson);
		});

		renderScoreboard(dom, state);

		localStorage.setItem("savedState", JSON.stringify(state));
	},

	// This loads a brand new state and recomputes the cached values
	// NB: This also has the effect of StopLoading after loading state
	LoadState: (newState, stationData, communes) => (dom, state) => {
		const stations = stationData.stations;
		state.found = newState.found;
		state.showAnswers = newState.showAnswers !== undefined ? newState.showAnswers : true;
		state.hoveredCommuneId = null;
		state.cache = {
			counts: { // raw values
				communes: 0,
				surface: 0, // in km²
				inhabitants: 0, // in thousands of people
				stations: 0,
				stationsPerLine: {}, // trainline_key => station count
			},
			stats: { // percentages
				communes: 0.0,
				surface: 0.0,
				inhabitants: 0.0,
				stations: 0.0,
			},
			totalCounts: { // from data loader
				communes: -1,
				surface: -1, // in km²
				inhabitants: -1, // in thousands of people
				stations: -1,
			},
			orderedTrainlines: [],
			foundKeys: {}, // speed up duplicate detection

			// We accumulate here the stations we find
			foundStationsGeojson: {
				type: "FeatureCollection",
				features: [],
			},
			foundCommunesGeojson: {
				type: "FeatureCollection",
				features: [],
			},
		};

		// TODO: avoid duplication with other actions (e.g., InitializeStationCache)
		state.cache.totalCounts.stations = 0;
		for (const [key, trainline] of Object.entries(stationData.meta.trainlines)) {
			state.cache.counts.stationsPerLine[key] = 0;
			state.cache.totalCounts.stations += trainline['station-count'];
		}
		state.cache.orderedTrainlines = stationData.meta["ordered-trainlines"];

		// Build a temporary mapping from id to geoFeatures (TODO: use stationData.idToIndex)
		const stationIdToIndex = {};
		stations.features.map((entry, index) => {
			stationIdToIndex[entry.properties.id_gares] = index;
		});
		const communeIdToIndex = {};
		communes.features.map((entry, index) => {
			communeIdToIndex[entry.properties.code] = index;
		});

		state.found.map(item => {
			if (item.id[0] === 'STATION') {
				state.cache.foundKeys[item.id] = true;
				const stationIndex = stationIdToIndex[item.id[1]];
				const geoFeature = stations.features[stationIndex];
				state.cache.foundStationsGeojson.features.push({
					...geoFeature,
					id: item.id[1]
				});
				++state.cache.counts.stations;
				++state.cache.counts.stationsPerLine[geoFeature.properties.trainline];
			} else if (item.id[0] === 'COMMUNE') {
				state.cache.foundKeys[item.id] = true;

				const communeIndex = communeIdToIndex[item.id[1]];
				const geoFeature = communes.features[communeIndex];

				console.assert(item.id[1] !== undefined);
				state.cache.foundCommunesGeojson.features.push({
					...geoFeature,
					id: item.id[1]
				});

				state.cache.counts.communes += 1;
				state.cache.counts.surface += geoFeature.properties.superficie;
				state.cache.counts.inhabitants += geoFeature.properties.population;
			}
		});

		Action._initializeTotalCounts(stationData, state);

		join($map, dataLoader.$stationData, (map, stationData) => {
            map.getSource('found-stations').setData(state.cache.foundStationsGeojson);
            map.getSource('found-communes').setData(state.cache.foundCommunesGeojson);
            renderFoundStationCamemberts(map, stationData, state);
        });


		state.loading = false;
		renderSearchForm(dom, state);
		renderScoreboard(dom, state);
		$map.then(map => {
			renderMap(map, state);
		});

		localStorage.setItem("savedState", JSON.stringify(state));
	},
};
function dispatch(dom, action) {
	action(dom, state);
}

function renderScoreboard(dom, state, newIndex) {
    dom["stat-communes"].innerText = state.cache.stats.communes.toFixed(1);
    dom["stat-surface"].innerText = state.cache.stats.surface.toFixed(1);
    dom["stat-inhabitants"].innerText = state.cache.stats.inhabitants.toFixed(1);
    dom["stat-stations"].innerText = state.cache.stats.stations.toFixed(1);

    dom["count-communes"].innerText = state.cache.counts.communes;
    dom["count-surface"].innerText = state.cache.counts.surface.toFixed(1);
    dom["count-inhabitants"].innerText = (state.cache.counts.inhabitants / 1000.0).toFixed(1);
    dom["count-stations"].innerText = state.cache.counts.stations;

    dom["btn-show-answers"].style.display = state.showAnswers ? "none" : "inline";
    dom["found"].style.display = state.showAnswers ? "block" : "none";

    join(dataLoader.$stationData, dataLoader.$communeData, (stationData, communeData) => {
        const lineItems = [];

        let insertedMetroIcon = false;
        let insertedFuniIcon = false;
        let insertedTramIcon = false;
        let insertedTBIcon = false;
        let insertedNaviIcon = false;

        for (const trainline_key of state.cache.orderedTrainlines) {
            const count = state.cache.counts.stationsPerLine[trainline_key];

            const isMetro = /^M[A-D]$/.test(trainline_key);      // MA MB MC MD
            const isFuni  = /^F[12]$/.test(trainline_key);       // F1 F2
            const isTram  = /^T\d+$/.test(trainline_key);        // T1 T2 ...
            const isTB    = /^TB\d+$/.test(trainline_key);       // TB11 TB12
            const isNavi  = /^NAVI?1$/.test(trainline_key);      // NAV1 ou NAVI1

            // Ligne 1 : M ... F ...
            if (isMetro && !insertedMetroIcon) {
                lineItems.push(renderScorboardSectionIcon("logo_M.svg", "Métro"));
                insertedMetroIcon = true;
            }

            if (isFuni && !insertedFuniIcon) {
				lineItems.push(renderScorboardLineBreak());
				lineItems.push(renderScorboardSectionIcon("logo_F.svg", "Funiculaire"));
               // lineItems.push(renderScorboardSectionIcon("logo_F.svg", "Funiculaire", "margin-left:0.045em;"));
                insertedFuniIcon = true;
            }

            // Retour à la ligne avant les trams
            if (isTram && !insertedTramIcon) {
                lineItems.push(renderScorboardLineBreak());
                lineItems.push(renderScorboardSectionIcon("logo_T.svg", "Tram"));
                insertedTramIcon = true;
            }

            // Retour à la ligne avant TB / NAVI
            if (isTB && !insertedTBIcon) {
                lineItems.push(renderScorboardLineBreak());
                lineItems.push(renderScorboardSectionIcon("logo_TB.svg", "TramBus"));
                insertedTBIcon = true;
            }

            if (isNavi && !insertedNaviIcon) {
				lineItems.push(renderScorboardLineBreak())
				lineItems.push(renderScorboardSectionIcon("logo_N.svg", "Navigône"));
               //lineItems.push(renderScorboardSectionIcon("logo_N.svg", "Navigône", "margin-left:0.045em;"));
                insertedNaviIcon = true;
            }

            lineItems.push(renderScorboardLineCounter(trainline_key, count, stationData));
        }

        dom["count-stations-per-line"].replaceChildren(...lineItems);

        dom.found.replaceChildren(...state.found.map((item, index) => {
            const isNew = index == newIndex;
            return renderScorboardFoundEntry(item, stationData, communeData, isNew);
        }));
    });
}



function renderScorboardLineCounter(trainline_key, count, stationData) {
	const trainline = stationData.meta.trainlines[trainline_key];
	const total = trainline['station-count'];
	const angle = 2.0 * Math.PI * (count | 0) / total;

	const logo = `<img src="data/images/${trainline.logo}" class="logo" alt="${trainline_key}" />`;
	const radius = 50 * Math.sqrt(2.0);
	const center = { x: 50, y: 50 };
	const clipPoly = [
		`${center.x}% ${center.y}%`,
		`${center.x}% ${center.y - radius}%`,
	];
	if (angle > Math.PI / 4.0) {
		clipPoly.push(`${center.x + radius}% ${center.y - radius}%`);
	}
	if (angle > 3.0 * Math.PI / 4.0) {
		clipPoly.push(`${center.x + radius}% ${center.y + radius}%`);
	}
	if (angle > 5.0 * Math.PI / 4.0) {
		clipPoly.push(`${center.x - radius}% ${center.y + radius}%`);
	}
	if (angle > 7.0 * Math.PI / 4.0) {
		clipPoly.push(`${center.x - radius}% ${center.y - radius}%`);
	}
	const x = Math.cos(angle - Math.PI / 2.0);
	const y = Math.sin(angle - Math.PI / 2.0);
	clipPoly.push(`${center.x + x * radius}% ${center.y + y * radius}%`);

	const progressStyle = count != total ? `clip-path: polygon(${clipPoly.join(", ")});` : "";
	const progressStyleClass = `
		text-color-${trainline['logo-style']['text-color']}
		shape-${trainline['logo-style']['shape']}
	`;

	const progress = `
		<div class="${progressStyleClass} progress-background"></div>
		<div class="${progressStyleClass} progress" style="${progressStyle}"></div>
	`;

	const element = document.createElement('li');
	element.setAttribute("title", `${trainline_key}: ${count} / ${total}`);
	element.innerHTML = `${logo}${progress}`;
	return element;
}

function renderScorboardSectionIcon(filename, alt, extraStyle = "") {

    element.setAttribute("class", "section-icon");
    if (extraStyle) {
        element.setAttribute("style", extraStyle);
    }
    element.innerHTML = `<img src="data/images/${filename}" class="logo" alt="${alt}" />`;
    return element;
}


function renderScorboardLineBreak() {
    const element = document.createElement('li');
    element.setAttribute("class", "line-break");
    return element;
}


function renderScorboardFoundEntry(item, stationData, communeData, isNew) {
	const className = isNew ? "new" : "";

	var logo = "";
	var flyTarget = null;
	if (item.id[0] == 'STATION' && stationData != null) {
		const index = stationData.idToIndex[item.id[1]];
		const feature = stationData.stations.features[index];
		const props = feature.properties;
		flyTarget = {
			center: feature.geometry.coordinates.slice(),
			zoom: 13,
		};
		logo = `<img src="${props.logo}" class="logo" />`;
	} else if (item.id[0] == 'COMMUNE') {
		const index = communeData.idToIndex[item.id[1]];
		const commune = communeData.communes.features[index].properties;
		flyTarget = {
			center: [commune.center.lon, commune.center.lat],
			zoom: 12,
		};
		logo = `<img src="data/images/commune.svg" class="logo" />`;
	}

	const element = document.createElement('li');
	element.setAttribute("class", isNew ? "new" : "");
	element.setAttribute("title", "Trouvé le XXX à XXXh");
	element.innerHTML = `${logo}${item.name}`;

	$map.then(map => {
		const source = item.id[0] == 'STATION' ? 'found-stations' : 'found-communes';
		const stateName = item.id[0] == 'STATION' ? 'active' : 'hover';

		element.addEventListener('mouseenter', () => {
			map.setFeatureState(
				{ source, id: item.id[1] },
				{ [stateName]: true }
			);
		});
		element.addEventListener('mouseleave', () => {
			map.setFeatureState(
				{ source, id: item.id[1] },
				{ [stateName]: false }
			);
		});
		if (flyTarget !== null) {
			element.addEventListener('click', () => {
				map.flyTo(flyTarget);
			});
		}
	});

	return element;
}

function renderSearchForm(dom, state) {
	const input = dom["search-input"];
	const form = dom["search-form"];
	const notif = dom["search-notification"];
	const loader = dom["search-loader"];
	const wasDisabled = input.disabled;
	input.disabled = state.loading;
	if (wasDisabled && !input.disabled) {
		//input.selectionStart = 0;
		//input.selectionEnd = input.value.length;
		input.focus();
	}
	if (state.notifyingSuccess) {
		input.value = "";
	}

		state.notifyingError ? "notify-error" :
		state.notifyingDuplicate ? "notify-duplicate" :

	);
	notif.innerText =

		state.notifyingDuplicate ? "Déjà trouvé !" :
		state.notifyingSuccess ? "Bravo !" : "";
	loader.style.visibility = state.loading ? "visible" : "hidden";
}

function renderMap(map, state) {

		);

function exportFile(filename, json) {
	var element = document.createElement('a');
	element.setAttribute('href', 'data:text/json;charset=utf-8,' + encodeURIComponent(json));
	element.setAttribute('download', filename);

	element.style.display = 'none';
	document.body.appendChild(element);

	element.click();

	document.body.removeChild(element);
}

// Open a file browser to load a json file
function importJsonFile() {
	return new Promise((resolve, reject) => {
		const element = document.createElement('input');
		element.setAttribute('type', 'file');
		element.setAttribute('accept', '*.json');
		element.addEventListener("change", event => {
			const reader = new FileReader();
			reader.addEventListener('load', () => {
				resolve(JSON.parse(reader.result));
			});
			reader.readAsText(element.files[0]);
		}, false);

		element.style.display = 'none';
		document.body.appendChild(element);
		element.click();
		document.body.removeChild(element);
	});
}

function makeFoundStationCamembertSVG(leftColor, rightColor, angleDeg = 90, visibleSize = 7, coverSize = 9.5) {
    const outerR = coverSize / 2;   // disque blanc de couverture
    const innerR = visibleSize / 2; // vrai camembert visibl

    const cx = outerR;
    const cy = outerR;

    // séparation gauche/droite par défaut, qu'on rotate ensuite
    const rotation = angleDeg - 90;

    return `
    <svg width="${coverSize}" height="${coverSize}" viewBox="0 0 ${coverSize} ${coverSize}" xmlns="http://www.w3.org/2000/svg">
        <!-- disque blanc de couverture pour masquer le cercle de base dessous -->
        <circle cx="${cx}" cy="${cy}" r="${outerR}" fill="#ffffff"/>

        <g transform="rotate(${rotation} ${cx} ${cy})">
            <!-- moitié gauche -->
            <path d="
                M ${cx} ${cy}
                L ${cx} ${cy - innerR}
                A ${innerR} ${innerR} 0 0 0 ${cx} ${cy + innerR}
                Z"
                fill="${leftColor}" />

            <!-- moitié droite -->
            <path d="
                M ${cx} ${cy}
                L ${cx} ${cy + innerR}
                A ${innerR} ${innerR} 0 0 0 ${cx} ${cy - innerR}
                Z"
                fill="${rightColor}" />
        </g>

        <!-- contour noir final -->
        <circle cx="${cx}" cy="${cy}" r="${innerR}" fill="none" stroke="#000000" stroke-width="1"/>
    </svg>
    `;
}

function renderFoundStationCamemberts(map, stationData, state) {
    // Nettoyage anciens marqueurs
    if (!map.__foundCamembertMarkers) {
        map.__foundCamembertMarkers = [];
    }
    for (const marker of map.__foundCamembertMarkers) {
        marker.remove();
    }
    map.__foundCamembertMarkers = [];

    // Grouper les stations trouvées par coordonnée exacte
    const buckets = new Map();

    for (const ft of state.cache.foundStationsGeojson.features) {
        if (!ft || !ft.geometry || ft.geometry.type !== "Point") continue;
        const coords = ft.geometry.coordinates;
        const props = ft.properties || {};
        const key = `${coords[0].toFixed(6)}|${coords[1].toFixed(6)}`;

        if (!buckets.has(key)) buckets.set(key, []);
        buckets.get(key).push(ft);
    }

    for (const entries of buckets.values()) {
        if (entries.length < 2) continue;

        const props = entries[0].properties || {};
		const stationIds = entries.map(ft => Number(ft.properties.id_gares));
		const config = stationIds
		.map(id => FOUND_STATION_CAMEMBERTS[id])
		.find(Boolean);

        if (!config) continue;

        // On ne traite que les stations qui ont explicitement une config
        const leftFt = entries.find(ft => ft.properties.trainline === config.left);
        const rightFt = entries.find(ft => ft.properties.trainline === config.right);
        if (!leftFt || !rightFt) continue;

        const leftColor = leftFt.properties.color;
        const rightColor = rightFt.properties.color;

        const el = document.createElement("div");
        el.className = "found-camembert-marker";
        el.style.pointerEvents = "none"; // laisse les clics passer à la couche found-stations
        el.innerHTML = makeFoundStationCamembertSVG(leftColor, rightColor, config.angleDeg, 7, 9.5);

        const marker = new mapboxgl.Marker({
            element: el,
            anchor: "center"
        })
            .setLngLat(entries[0].geometry.coordinates)
            .addTo(map);

        map.__foundCamembertMarkers.push(marker);
    }
}

// Structure hiding the mechanism through which we fix small typos in user guesses
class MemoryEngine {
	constructor() {
		this.data = {}; // naive baseline
	}

	insert(key, value) {
		const nkey = this._normalizeKey(key);
		this.data[nkey] = value;
		return this;
	}

	// This is called after all insert and before all search
	freeze() {
		this.fuzzyset = FuzzySet(Object.keys(this.data));
		return this;
	}

	search(query) {
		return new Promise((resolve, reject) => {
			const nkey = this._normalizeKey(query);

			// naive baseline
			//resolve(this.data[nkey]);

			// fuzzyset
			const results = this.fuzzyset.get(nkey, null, 0.9);
			if (results == null) resolve(null);
			else resolve(this.data[results[0][1]]);
		});
	}

	_normalizeKey(str) {
		return str
			.normalize("NFD")
			.replace(/[\u0300-\u036f]/g, "")
			.replace(/-/g, ' ')
			.replace(/\s+/g, ' ')
			.toLowerCase();
	}
}

// Add post-loading operations
dataLoader.$stationMemory = dataLoader.$stations.then(stations => {
	const engine = new MemoryEngine();

	stations.features.map((item, index) => {
		const props = item.properties;
		const payload = {
			type: 'STATION',
			index
		};
		// nom de gare seul:
		engine.insert(props.nom_gares, payload);
		engine.insert(props.nom_iv, payload);
		engine.insert(props.nom_zdc, payload);
		if (Array.isArray(props.aliases)) {
			props.aliases.forEach(alias => {
				if (alias && typeof alias === "string") {
            		engine.insert(alias, payload);
       			}
    		});
		}
	});

	engine.freeze();

	return engine;
});

// Add post-loading operations
dataLoader.$communeMemory = dataLoader.$communes.then(communes => {
	const engine = new MemoryEngine();

	communes.features.map((item, index) => {
		const props = item.properties;
		const payload = {
			type: 'COMMUNE',
			index
		};
		engine.insert(props.nom, payload);
		if (props.nom.startsWith("Paris") && props.nom.endsWith("Arrondissement")) {
			const end = props.nom.length - "Arrondissement".length - 1;
			engine.insert(props.nom.substr(0, end), payload);
			engine.insert(props.nom.substr("Paris".length + 1), payload);
		}
	});

	engine.freeze();

	return engine;
});

const $gameplayReady = join($dom, dataLoader.$stationMemory, dataLoader.$communeMemory, dataLoader.$stationData, dataLoader.$communes,
(dom, stationMemory, communeMemory, stationData, communes) => {
	const stations = stationData.stations;
	// We can now add the search event handler
	dom["search-form"].addEventListener('submit', () => {
		if (state.loading) return;
		const query = dom["search-input"].value;

		dispatch(dom, Action.StartLoading());

		const $allResults = Promise.all([
			stationMemory.search(query),
			communeMemory.search(query)
		])

		$allResults.then(allResults => {
			let allNull = true;
			let allDuplicates = true;
			for (const result of allResults) {
				if (result == null) continue;
				allNull = false;
				if (result.type == 'STATION') {

					const props = stations.features[result.index].properties;
					const item_id = ['STATION', props.id_gares];

					const alreadyFound = state.cache.foundKeys[item_id];
					if (!alreadyFound) {
						allDuplicates = false;
						const connected_ids = stationData.meta['connected-stations'][props.id_gares] || [props.id_gares];

						connected_ids.map(id => {

							const index = stationData.idToIndex[id];
							if (index === undefined) return; // happens when the statino has been removed because on an ignored train line
							const props = stations.features[index].properties;
							dispatch(dom, Action.AppendFoundStationItem({
								id: ['STATION', props.id_gares],
								name: props.nom_zdc,
							}, stations.features[index]));

						});
					}
				} else if (result.type == 'COMMUNE') {

					const geoFeature = communes.features[result.index];
					const item_id = ['COMMUNE', geoFeature.properties.code];

					const alreadyFound = state.cache.foundKeys[item_id];
					if (!alreadyFound) {
						allDuplicates = false;
						dispatch(dom, Action.AppendFoundCommuneItem(item_id, geoFeature));
					}
				}
			}

			if (allNull) {
				dispatch(dom, Action.NotifyError());
			} else if (allDuplicates) {
				dispatch(dom, Action.NotifyDuplicate());
			} else {
				dispatch(dom, Action.NotifySuccess());
			}

			dispatch(dom, Action.StopLoading());
		});
	});

	dispatch(dom, Action.InitializeStationCache(stationData));
	dispatch(dom, Action.StopLoading());
});
